<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sosyal Medya - Profil</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #9fc1e3 !important;
        }

        .navbar {
            background: linear-gradient(135deg, #1e3c72 0%, #5191ff 100%) !important;
        }

        .btn-success {
            background-color: #2e7d32 !important;
            border-color: #2e7d32 !important;
        }

        .btn-primary {
            background-color: #2a5298 !important;
            border-color: #2a5298 !important;
        }

        .btn-primary:hover {
            background-color: #1e3c72 !important;
        }

        .btn-outline-primary {
            color: #2a5298 !important;
            border-color: #2a5298 !important;
        }

        .btn-outline-primary:hover {
            background-color: #2a5298 !important;
            color: #ffffff !important;
        }

        .btn-outline-secondary {
            color: #4a6984 !important;
            border-color: #a0b2c6 !important;
        }

        .btn-outline-secondary:hover {
            background-color: #4a6984 !important;
            color: #ffffff !important;
            border-color: #4a6984 !important;
        }

        .card {
            border: 8px solid #e2eaf1 !important;
            border-radius: 12px !important;
        }

        .card-title {
            color: #1e3c72;
        }

        .text-muted-blue {
            color: #627d98 !important;
        }

        .profil-avatar {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #2a5298 0%, #1e3c72 100%);
            color: white;
            font-size: 32px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 15px auto;
            border-radius: 50%;
            box-shadow: 0 4px 10px rgba(30, 60, 114, 0.2);
        }

        .sayi-kutusu-btn {
            background-color: #f8fafc;
            border-radius: 8px;
            padding: 8px 20px;
            border: 1px solid #e2eaf1;
            min-width: 120px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .sayi-kutusu-btn:hover {
            background-color: #e2eaf1;
            transform: scale(1.03);
        }

        /* ✨ Ortak Modal Tasarım Düzenlemeleri */
        .modal-content {
            border-radius: 20px !important;
            border: none !important;
            box-shadow: 0 15px 35px rgba(30, 60, 114, 0.2) !important;
            overflow: hidden;
            /* İçerideki body'lerin alt köşelerden taşmasını engeller */
        }

        .modal-header {
            background-color: #f0f4f8 !important;
            color: #1e3c72 !important;
            border-bottom: 1px solid #e2eaf1 !important;
            border-top-left-radius: 20px !important;
            border-top-right-radius: 20px !important;
            padding: 1rem 1.25rem;
        }

        .modal-body {
            background-color: #ffffff !important;
            border-bottom-left-radius: 20px !important;
            /* Alt köşeleri yuvarla */
            border-bottom-right-radius: 20px !important;
            padding: 1.25rem;
        }

        .liste-satiri {
            background-color: #f8fafc;
            border-radius: 8px;
            padding: 8px 12px;
            margin-bottom: 8px;
            border-left: 3px solid #2a5298;
        }

        .gonderi-kart {
            background-color: #ffffff;
            border-radius: 12px;
            overflow: hidden;
            margin-bottom: 20px;
            border: 1px solid #e2eaf1;
        }

        .yorum-satiri {
            background-color: #f8fafc;
            border-radius: 10px;
            padding: 10px 14px;
            margin-bottom: 10px;
            border-left: 4px solid #2a5298;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.02);
        }

        /* Bildirim Tasarım Stilleri */
        .notification-dropdown {
            width: 320px !important;
            max-height: 420px;
            overflow-y: auto;
            border-radius: 12px !important;
            border: none !important;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.15);
        }

        .notification-item {
            border-bottom: 1px solid #f0f4f8;
            padding: 10px 15px;
            font-size: 13px;
            cursor: pointer;
            transition: background 0.2s;
            white-space: normal !important;
        }

        .notification-item:hover {
            background-color: #f1f5f9;
        }

        .notification-unread {
            background-color: #e0f2fe !important;
            font-weight: 500;
            border-left: 4px solid #3b82f6;
        }
    </style>
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-dark shadow mb-4">
        <div class="container">
            <a class="navbar-brand fw-bold" href="feed.html">BARUSOSYAL</a>
            <div class="d-flex align-items-center">

                <div class="dropdown me-3">
                    <button class="btn btn-light btn-sm rounded-pill position-relative dropdown-toggle" type="button"
                        id="notifDropdownBtn" data-bs-toggle="dropdown" aria-expanded="false"
                        onclick="bildirimleriYukle()">
                        Bildirimler <span id="notifBadge"
                            class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger d-none">0</span>
                    </button>
                    <ul class="dropdown-menu dropdown-menu-end notification-dropdown" aria-labelledby="notifDropdownBtn"
                        id="notifMenu">
                        <li class="p-3 text-center text-muted small">Bildirimler yükleniyor...</li>
                    </ul>
                </div>

                <a href="clubs.html" class="btn btn-light btn-sm me-2 text-primary fw-semibold rounded-pill px-3">
                    Kulüpler & Etkinlikler</a>

                <span id="navUsername"
                    class="text-white me-3 fw-semibold bg-white bg-opacity-25 px-3 py-1 rounded-pill">@kullanici</span>
                <a href="feed.html" class="btn btn-light btn-sm me-2 text-primary fw-semibold rounded-pill px-3">Ana
                    Sayfa</a>
                <button onclick="cikisYap()" class="btn btn-danger btn-sm rounded-pill px-3">Çıkış</button>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6">

                <div class="card shadow-sm mb-4 text-center bg-white border-0">
                    <div class="card-body py-4">
                        <div id="profHarf" class="profil-avatar shadow-sm">-</div>
                        <h3 id="profAdSoyad" class="card-title fw-bold mb-1">-</h3>
                        <p id="profKullaniciAdi" class="text-primary fw-semibold mb-2">@-</p>
                        <p id="profEmail" class="small text-muted-blue mb-4">-</p>

                        <div class="d-flex justify-content-center gap-4 mt-3">
                            <div class="sayi-kutusu-btn shadow-sm" onclick="listeGoster('followers')">
                                <h4 id="takipciSayisi" class="fw-bold mb-0 text-dark">0</h4>
                                <small class="text-muted-blue fw-medium">Takipçi</small>
                            </div>
                            <div class="sayi-kutusu-btn shadow-sm" onclick="listeGoster('following')">
                                <h4 id="takipEdilenSayisi" class="fw-bold mb-0 text-dark">0</h4>
                                <small class="text-muted-blue fw-medium">Takip Edilen</small>
                            </div>
                        </div>

                        <div id="profilDuzenleButonAlani" class="mt-4 d-none">
                            <button class="btn btn-outline-secondary btn-sm px-4 rounded-pill fw-semibold shadow-sm"
                                data-bs-toggle="modal" data-bs-target="#profileEditModal">
                                Profili Düzenle
                            </button>
                        </div>

                        <div id="takipButonAlani" class="mt-4 d-none">
                            <button id="btnTakip" onclick="takipAksiyon()"
                                class="btn btn-primary px-5 rounded-pill fw-semibold shadow-sm">Takip Et</button>
                        </div>
                    </div>
                </div>

                <h5 class="fw-bold mb-3 text-secondary px-1"> Paylaşılan Gönderiler</h5>
                <div id="profilGonderilerAlani"></div>

            </div>
        </div>
    </div>

    <div class="modal fade" id="profileEditModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title fw-bold">Profili Düzenle</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body p-4">
                    <form id="updateProfileForm">
                        <div class="mb-3">
                            <label class="form-label small text-muted-blue fw-semibold">Kullanıcı Adı (Takma Ad)</label>
                            <input type="text" id="editKullaniciTakmaAdi" class="form-control border-info-subtle"
                                required>
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label small text-muted-blue fw-semibold">Ad</label>
                                <input type="text" id="editAd" class="form-control border-info-subtle" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label small text-muted-blue fw-semibold">Soyad</label>
                                <input type="text" id="editSoyad" class="form-control border-info-subtle" required>
                            </div>
                        </div>
                        <button type="submit"
                            class="btn btn-success btn-sm px-4 rounded-pill float-end fw-semibold shadow-sm">Değişiklikleri
                            Kaydet</button>
                    </form>
                    <div id="updateMessage" class="alert d-none mt-3 rounded-pill text-center py-2 small"></div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="followListModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered modal-sm">
            <div class="modal-content">
                <div class="modal-header">
                    <h6 class="modal-title fw-bold" id="modalListTitle">Kullanıcılar</h6>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body" id="modalListBody" style="max-height: 350px; overflow-y: auto;"></div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="commentsModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header">
                    <h6 class="modal-title fw-bold">Yorumlar</h6>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body" id="modalCommentsBody" style="max-height: 350px; overflow-y: auto;"></div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        const API_URL = "https://localhost:7160/api";

        const aktifKullaniciId = localStorage.getItem("kullaniciId");
        const aktifKullaniciAdi = localStorage.getItem("kullaniciAdi");

        const urlParams = new URLSearchParams(window.location.search);
        const profilSahibiId = urlParams.get('id') || aktifKullaniciId;

        if (!aktifKullaniciId) {
            alert("Lütfen önce giriş yapın!");
            window.location.href = "index.html";
        } else {
            document.getElementById("navUsername").textContent = "@" + aktifKullaniciAdi;
        }

        const kendiProfilimMi = (profilSahibiId === aktifKullaniciId);

        async function profilYukle() {
            try {
                const response = await fetch(`${API_URL}/user/${profilSahibiId}`);
                if (response.ok) {
                    const data = await response.json();
                    document.getElementById("profAdSoyad").textContent = data.ad + " " + data.soyad;
                    document.getElementById("profKullaniciAdi").textContent = "@" + data.kullaniciAdi;
                    document.getElementById("profEmail").textContent = data.email;
                    document.getElementById("profHarf").textContent = data.ad.charAt(0).toUpperCase();
                    document.getElementById("takipciSayisi").textContent = data.takipciSayisi ?? 0;
                    document.getElementById("takipEdilenSayisi").textContent = data.takipEdilenSayisi ?? 0;

                    if (kendiProfilimMi) {
                        document.getElementById("profilDuzenleButonAlani").classList.remove("d-none");
                        document.getElementById("takipButonAlani").classList.add("d-none");
                        document.getElementById("editKullaniciTakmaAdi").value = data.kullaniciAdi;
                        document.getElementById("editAd").value = data.ad;
                        document.getElementById("editSoyad").value = data.soyad;
                    } else {
                        document.getElementById("profilDuzenleButonAlani").classList.add("d-none");
                        document.getElementById("takipButonAlani").classList.remove("d-none");
                    }
                }
            } catch (error) { console.error("Hata:", error); }
        }

        async function gonderileriYukle() {
            const gonderiAlani = document.getElementById("profilGonderilerAlani");
            gonderiAlani.innerHTML = "<p class='text-muted text-center small py-3'>Gönderiler yükleniyor...</p>";
            try {
                const response = await fetch(`${API_URL}/post/user/${profilSahibiId}`);
                if (response.ok) {
                    const postlar = await response.json();
                    gonderiAlani.innerHTML = "";
                    if (postlar.length === 0) {
                        gonderiAlani.innerHTML = "<p class='text-muted text-center small py-4 bg-white rounded-3 border'>Henüz hiç gönderi paylaşılmamış.</p>";
                        return;
                    }
                    postlar.forEach(p => {
                        const silButonuHtml = kendiProfilimMi ? `<button onclick="gonderiSil(${p.gonderiId})" class="btn btn-sm btn-outline-danger border-0 float-end">Gönderiyi Sil</button>` : "";

                        const fotoHtml = p.fotograf && p.fotograf.trim() !== ""
                            ? `<img src="${API_URL.replace('/api', '')}${p.fotograf}" class="img-fluid w-100" style="max-height: 400px; object-fit: cover;" alt="Gönderi Fotoğrafı">`
                            : "";

                        const aciklamaHtml = p.aciklama && p.aciklama.trim() !== ""
                            ? `<p class="card-text mb-3"><strong class="text-primary">@${p.kullaniciAdi}</strong> ${p.aciklama}</p>`
                            : `<p class="card-text mb-3"><strong class="text-primary">@${p.kullaniciAdi}</strong></p>`;

                        const postHtml = `
                            <div class="gonderi-kart shadow-sm">
                                <div class="p-3 border-bottom d-flex justify-content-between align-items-center bg-light bg-opacity-50">
                                    <span class="fw-bold text-primary" style="font-size: 14px;">@${p.kullaniciAdi}</span>
                                    ${silButonuHtml}
                                </div>
                                ${fotoHtml}
                                <div class="card-body p-4 bg-white">
                                    ${aciklamaHtml}
                                    <div class="d-flex gap-2 align-items-center mb-3">
                                        <button onclick="begeniEkle(${p.gonderiId})" class="btn btn-outline-primary btn-sm rounded-pill px-3 fw-semibold">💙 Beğen (${p.begeniSayisi})</button>
                                        <button onclick="yorumlarıGoster(${p.gonderiId})" class="btn btn-outline-secondary btn-sm rounded-pill px-3 fw-semibold">💬 Yorumlar</button>
                                    </div>
                                    <div class="input-group input-group-sm mt-3 shadow-sm rounded-pill overflow-hidden">
                                        <input type="text" class="form-control border-0 px-3 bg-light" placeholder="Yorum yaz...">
                                        <button onclick="yorumYap(${p.gonderiId}, this)" class="btn btn-primary px-3 fw-semibold" type="button">Gönder</button>
                                    </div>
                                </div>
                            </div>
                        `;
                        gonderiAlani.insertAdjacentHTML("beforeend", postHtml);
                    });
                }
            } catch (error) { gonderiAlani.innerHTML = "<p class='text-danger text-center small py-3'>Bağlantı hatası.</p>"; }
        }

        async function gonderiSil(gonderiId) {
            if (!confirm("Bu gönderiyi tamamen silmek istediğinize emin misiniz?")) return;
            try {
                const response = await fetch(`${API_URL}/post/${gonderiId}/${aktifKullaniciId}`, { method: "DELETE" });
                if (response.ok) { alert("Gönderi başarıyla silindi!"); gonderileriYukle(); }
                else {
                    const err = await response.json();
                    alert(err.error || "Gönderi silnemedi.");
                }
            } catch (error) { alert("Silme işleminde sunucu hatası."); }
        }

        async function yorumlarıGoster(gonderiId) {
            const modalBody = document.getElementById("modalCommentsBody");
            modalBody.innerHTML = "<p class='text-muted-blue text-center small my-3'>Yorumlar yükleniyor...</p>";
            const myModal = new bootstrap.Modal(document.getElementById('commentsModal'));
            myModal.show();
            try {
                const response = await fetch(`${API_URL}/comment/${gonderiId}`);
                if (response.ok) {
                    const yorumlar = await response.json();
                    modalBody.innerHTML = "";
                    if (yorumlar.length === 0) { modalBody.innerHTML = "<p class='text-muted-blue text-center small my-3'>Henüz yorum yapılmamış.</p>"; return; }
                    yorumlar.forEach(y => {
                        modalBody.insertAdjacentHTML("beforeend", `<div class="yorum-satiri shadow-sm"><span class="fw-bold small text-primary">@${y.kullaniciAdi}:</span> <span class="small text-dark">${y.yorumMetni}</span></div>`);
                    });
                }
            } catch (error) { modalBody.innerHTML = "<p class='text-danger text-center small my-3'>Yorumlar getirilemedi.</p>"; }
        }

        async function begeniEkle(gonderiId) {
            try {
                const response = await fetch(`${API_URL}/like/add?kullaniciId=${aktifKullaniciId}&gonderiId=${gonderiId}`, { method: "POST" });
                if (response.ok) gonderileriYukle();
            } catch (error) { alert("Beğeni işlenirken bir hata oluştu."); }
        }

        async function yorumYap(gonderiId, btnElement) {
            const input = btnElement.previousElementSibling;
            const yorumMetni = input.value;
            if (!yorumMetni.trim()) return;
            try {
                const response = await fetch(`${API_URL}/comment/add?kullaniciId=${aktifKullaniciId}&gonderiId=${gonderiId}&yorum=${encodeURIComponent(yorumMetni)}`, { method: "POST" });
                if (response.ok) { alert("Yorum eklendi!"); input.value = ""; gonderileriYukle(); }
            } catch (error) { alert("Yorum gönderilemedi."); }
        }

        async function listeGoster(tip) {
            const modalBody = document.getElementById("modalListBody");
            const modalTitle = document.getElementById("modalListTitle");
            modalTitle.textContent = tip === 'followers' ? "👥 Takipçiler" : "👥 Takip Edilenler";
            modalBody.innerHTML = "<p class='text-muted text-center small my-3'>Yükleniyor...</p>";
            const myModal = new bootstrap.Modal(document.getElementById('followListModal'));
            myModal.show();
            try {
                const response = await fetch(`${API_URL}/follow/${profilSahibiId}/${tip}`);
                if (response.ok) {
                    const kullanıcılar = await response.json();
                    modalBody.innerHTML = "";
                    if (kullanıcılar.length === 0) { modalBody.innerHTML = "<p class='text-muted text-center small my-3'>Liste boş.</p>"; return; }
                    kullanıcılar.forEach(k => {
                        modalBody.insertAdjacentHTML("beforeend", `<div class="liste-satiri shadow-sm d-flex justify-content-between align-items-center"><div><span class="fw-bold small text-primary d-block">@${k.username}</span><small class="text-secondary" style="font-size:11px;">${k.firstName} ${k.lastName}</small></div><a href="profile.html?id=${k.id}" class="btn btn-sm btn-light py-0 px-2 text-primary border" style="font-size:11px;">Gör</a></div>`);
                    });
                }
            } catch (e) { modalBody.innerHTML = "<p class='text-danger text-center small my-3'>Liste yüklenemedi.</p>"; }
        }

        async function takipAksiyon() {
            const btn = document.getElementById("btnTakip");
            if (btn.textContent === "Takip Et") {
                const followData = { takipEdenId: parseInt(aktifKullaniciId), takipEdilenId: parseInt(profilSahibiId) };
                try {
                    const response = await fetch(`${API_URL}/follow`, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(followData) });
                    if (response.ok) { btn.textContent = "Takip Ediliyor"; btn.className = "btn btn-outline-primary px-5 rounded-pill fw-semibold shadow-sm"; profilYukle(); }
                } catch (error) { alert("Hata oluştu."); }
            } else {
                try {
                    const response = await fetch(`${API_URL}/follow/eden/${aktifKullaniciId}/edilen/${profilSahibiId}`, { method: "DELETE" });
                    if (response.ok) { btn.textContent = "Takip Et"; btn.className = "btn btn-primary px-5 rounded-pill fw-semibold shadow-sm"; profilYukle(); }
                } catch (error) { alert("Hata oluştu."); }
            }
        }

        document.getElementById("updateProfileForm").addEventListener("submit", async (e) => {
            e.preventDefault();
            const msgBox = document.getElementById("updateMessage");
            msgBox.classList.add("d-none");
            const guncellemeVerisi = { kullaniciTakmaAdi: document.getElementById("editKullaniciTakmaAdi").value, ad: document.getElementById("editAd").value, soyad: document.getElementById("editSoyad").value };
            try {
                const response = await fetch(`${API_URL}/user/${aktifKullaniciId}`, { method: "PUT", headers: { "Content-Type": "application/json" }, body: JSON.stringify(guncellemeVerisi) });
                if (response.ok) { localStorage.setItem("kullaniciAdi", guncellemeVerisi.kullaniciTakmaAdi); msgBox.textContent = "Profil başarıyla güncellendi!"; msgBox.className = "alert alert-success mt-3 rounded-pill text-center py-2 small"; msgBox.classList.remove("d-none"); setTimeout(() => { location.reload(); }, 1000); }
            } catch (error) { console.error(error); }
        });

        async function bildirimleriYukle() {
            try {
                const response = await fetch(`${API_URL}/notification/${aktifKullaniciId}`);
                if (response.ok) {
                    const bildirimler = await response.json();
                    const notifMenu = document.getElementById("notifMenu");
                    const notifBadge = document.getElementById("notifBadge");

                    notifMenu.innerHTML = `<li class="p-2 border-bottom fw-bold text-center text-primary small">Bildirimler</li>`;

                    const okunmamisSayisi = bildirimler.filter(b => !b.isRead).length;
                    if (okunmamisSayisi > 0) {
                        notifBadge.textContent = okunmamisSayisi;
                        notifBadge.classList.remove("d-none");
                    } else {
                        notifBadge.classList.add("d-none");
                    }

                    if (bildirimler.length === 0) {
                        notifMenu.innerHTML += `<li class="p-3 text-center text-muted small">Henüz bildiriminiz yok.</li>`;
                        return;
                    }

                    bildirimler.forEach(b => {
                        let bildirimMetni = "";
                        if (b.bildirimTuru === "begeni") bildirimMetni = `<b>@${b.tetikleyenKullaniciAdi}</b> gönderini beğendi.`;
                        else if (b.bildirimTuru === "yorum") bildirimMetni = `<b>@${b.tetikleyenKullaniciAdi}</b> gönderine yorum yaptı: "${b.icerik}"`;
                        else if (b.bildirimTuru === "takip") bildirimMetni = `<b>@${b.tetikleyenKullaniciAdi}</b> seni takip etmeye başladı.`;

                        const unreadClass = !b.isRead ? "notification-unread" : "";

                        const itemHtml = `
                            <li>
                                <a class="dropdown-item notification-item ${unreadClass}" onclick="bildirimOku(${b.bildirimId}, ${b.gonderiId})">
                                    <div>${bildirimMetni}</div>
                                    <small class="text-muted" style="font-size:10px;">${new Date(b.olusturulmaTarihi).toLocaleDateString()}</small>
                                </a>
                            </li>
                        `;
                        notifMenu.insertAdjacentHTML("beforeend", itemHtml);
                    });
                }
            } catch (error) { console.error("Bildirim hatası:", error); }
        }

        async function bildirimOku(bildirimId, gonderiId) {
            try {
                await fetch(`${API_URL}/notification/read/${bildirimId}/${aktifKullaniciId}`, { method: "PUT" });
                bildirimleriYukle();
                if (gonderiId) { location.reload(); }
            } catch (error) { console.error(error); }
        }

        function cikisYap() { localStorage.clear(); window.location.href = "index.html"; }

        profilYukle();
        gonderileriYukle();
        bildirimleriYukle();
        setInterval(bildirimleriYukle, 30000);
    </script>
</body>

</html>
