<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sosyal Medya - Kayıt Ol</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #9fc1e3 !important;
        }

        .card {
            border: 8px solid #e2eaf1 !important;
            border-radius: 20px !important;
            box-shadow: 0 15px 35px rgba(30, 60, 114, 0.2) !important;
            padding: 10px;
        }

        .card-title {
            color: #1e3c72;
            font-weight: 800;
        }

        .form-control {
            border: 2px solid #e2eaf1 !important;
            border-radius: 10px !important;
            padding: 10px 15px;
        }

        .form-control:focus {
            border-color: #2a5298 !important;
            box-shadow: 0 0 0 0.2rem rgba(42, 82, 152, 0.25) !important;
        }

        .btn-primary {
            background-color: #2a5298 !important;
            border-color: #2a5298 !important;
            border-radius: 50px !important;
            padding: 10px 25px;
            font-weight: 600;
        }

        .btn-primary:hover {
            background-color: #1e3c72 !important;
        }

        .text-muted-blue {
            color: #627d98 !important;
        }
    </style>
</head>

<body>

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="card bg-white border-0">
                    <div class="card-body p-4">
                        <h3 class="card-title text-center mb-4">Yeni Hesap Oluştur</h3>

                        <form id="registerForm">
                            <div class="mb-3">
                                <label class="form-label small text-muted-blue fw-semibold">Kullanıcı Adı</label>
                                <input type="text" id="kullaniciTakmaAdi" class="form-control" required placeholder="ornek_kullanici">
                            </div>

                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label small text-muted-blue fw-semibold">Ad</label>
                                    <input type="text" id="ad" class="form-control" required placeholder="Ali">
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label small text-muted-blue fw-semibold">Soyad</label>
                                    <input type="text" id="soyad" class="form-control" required placeholder="Kara">
                                </div>
                            </div>

                            <div class="mb-3">
                                <label class="form-label small text-muted-blue fw-semibold">E-posta (@bartin.edu.tr)</label>
                                <input type="email" id="email" class="form-control" required
                                    pattern="[a-z0-9._%+-]+@[a-z0-9.-]*bartin\.edu\.tr"
                                    placeholder="okulnumaranız@ogrenci.bartin.edu.tr">
                            </div>

                            <div class="mb-4">
                                <label class="form-label small text-muted-blue fw-semibold">Şifre</label>
                                <input type="password" id="sifre" class="form-control" required placeholder="******">
                            </div>

                            <button type="submit" class="btn btn-primary w-100 mb-3">Kayıt Ol</button>
                        </form>

                        <div id="responseMessage" class="alert d-none text-center small"></div>

                        <div class="text-center mt-3">
                            <a href="index.html" class="text-decoration-none text-primary fw-bold">Zaten hesabın var mı? Giriş Yap</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = "https://localhost:7160/api";

        document.getElementById("registerForm").addEventListener("submit", async (e) => {
            e.preventDefault();
            const msgBox = document.getElementById("responseMessage");
            msgBox.classList.remove("d-none", "alert-success", "alert-danger");

            const kayitVerisi = {
                kullaniciTakmaAdi: document.getElementById("kullaniciTakmaAdi").value,
                ad: document.getElementById("ad").value,
                soyad: document.getElementById("soyad").value,
                email: document.getElementById("email").value,
                sifre: document.getElementById("sifre").value
            };

            try {
                const response = await fetch(`${API_URL}/auth/register`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(kayitVerisi)
                });

                if (response.ok) {
                    msgBox.textContent = "Kayıt başarıyla tamamlandı! Yönlendiriliyorsunuz...";
                    msgBox.classList.add("alert-success");
                    setTimeout(() => { window.location.href = "index.html"; }, 2000);
                } else {
                    const errorText = await response.text();
                    msgBox.textContent = errorText || "Bir hata oluştu.";
                    msgBox.classList.add("alert-danger");
                }
            } catch (error) {
                msgBox.textContent = "Sunucuya bağlanılamadı.";
                msgBox.classList.add("alert-danger");
            }
        });
    </script>
</body>
</html>
