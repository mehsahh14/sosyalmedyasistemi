<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BARUSOSYAL - Kulüpler ve Etkinlikler</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #9fc1e3 !important;
        }

        .navbar {
            background: linear-gradient(135deg, #1e3c72 0%, #5191ff 100%) !important;
        }

        .card {
            border: 6px solid #e2eaf1 !important;
            border-radius: 12px !important;
        }

        .text-primary-blue {
            color: #1e3c72 !important;
        }

        .btn-primary {
            background-color: #2a5298 !important;
            border-color: #2a5298 !important;
        }

        .btn-primary:hover {
            background-color: #1e3c72 !important;
        }

        .etkinlik-badge {
            background-color: #e0f2fe;
            color: #0369a1;
            font-weight: 600;
            padding: 5px 12px;
            border-radius: 20px;
            text-decoration: none;
        }

        .modal-content {
            border-radius: 20px !important;
            overflow: hidden;
        }

        .modal-header {
            background-color: #f0f4f8 !important;
            color: #1e3c72 !important;
        }
    </style>
</head>

<body>

    <nav class="navbar navbar-expand-lg navbar-dark shadow mb-4">
        <div class="container">
            <a class="navbar-brand fw-bold" href="feed.html">BARUSOSYAL</a>
            <div class="d-flex align-items-center">
                <a href="profile.html" class="text-decoration-none">
                    <span id="navUsername"
                        class="text-white me-3 fw-bold bg-white bg-opacity-25 px-3 py-1 rounded-pill shadow-sm transition-all"
                        style="cursor: pointer;"> @kullanici</span>
                </a>

                <a href="feed.html" class="btn btn-light btn-sm me-2 text-primary fw-semibold rounded-pill px-3">Ana
                    Sayfa</a>
                <button class="btn btn-success btn-sm me-2 rounded-pill px-3" data-bs-toggle="modal"
                    data-bs-target="#createClubModal">Yeni Kulüp Oluştur</button>
                <button onclick="cikisYap()" class="btn btn-danger btn-sm rounded-pill px-3">Çıkış</button>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="row">
            <div class="col-md-8 mb-4">
                <h4 class="text-primary-blue fw-bold mb-3">Yaklaşan Kampüs Etkinlikleri</h4>
                <div id="etkinliklerAlani" class="row row-cols-1 row-cols-md-2 g-3"></div>
            </div>

            <div class="col-md-4">
                <h4 class="text-primary-blue fw-bold mb-3">Öğrenci Kulüpleri</h4>
                <div class="card shadow-sm p-3 bg-white border-0">
                    <div class="list-group list-group-flush" id="kuluplerAlani"></div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="createClubModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content shadow border-0">
                <div class="modal-header">
                    <h5 class="modal-title fw-bold">Yeni Öğrenci Kulübü Başvurusu</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="clubForm">
                        <div class="mb-3">
                            <label class="form-label small fw-semibold">Kulüp Adı</label>
                            <input type="text" id="clubName" class="form-control" required
                                placeholder="Kulüp adını giriniz">
                        </div>
                        <div class="mb-3">
                            <label class="form-label small fw-semibold">Kulüp Amacı ve Açıklaması</label>
                            <textarea id="clubDesc" class="form-control" rows="3" required
                                placeholder="Kulübün akademik veya sosyal amaçlarını belirtiniz"></textarea>
                        </div>
                        <button type="submit"
                            class="btn deletePost btn-primary btn-sm px-4 rounded-pill float-end fw-semibold">Başvuruyu
                            Tamamla</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const API_URL = "https://localhost:7160/api";
        document.addEventListener("DOMContentLoaded", () => {
            const navUsername = document.getElementById("navUsername");
            const kaydedilenKullaniciAdi = localStorage.getItem("kullaniciAdi");

            if (navUsername && kaydedilenKullaniciAdi) {
                navUsername.textContent = "@" + kaydedilenKullaniciAdi;
            }
        });
        const aktifKullaniciId = localStorage.getItem("kullaniciId");

        // 1. ETKİNLİKLERİ API'DEN YÜKLE
        async function etkinlikleriYukle() {
            const alan = document.getElementById("etkinliklerAlani");
            try {
                const response = await fetch(`${API_URL}/club/events`);
                if (response.ok) {
                    const etkinlikler = await response.json();
                    alan.innerHTML = "";
                    if (etkinlikler.length === 0) {
                        alan.innerHTML = "<p class='text-white px-3'>Planlanmış aktif bir etkinlik bulunmamaktadır.</p>";
                        return;
                    }
                    etkinlikler.forEach(e => {
                        const tarih = new Date(e.etkinlikTarihi).toLocaleString("tr-TR", { dateStyle: "short", timeStyle: "short" });
                        alan.insertAdjacentHTML("beforeend", `
                            <div class="col">
                                <div class="card h-100 shadow-sm border-0 bg-white p-3">
                                    <div class="mb-2"><a href="club-profile.html?id=${e.kulupId}" class="etkinlik-badge small">${e.kulupAdi} Profili</a></div>
                                    <h5 class="fw-bold text-primary-blue mb-2">${e.etkinlikAdi}</h5>
                                    <p class="text-secondary small flex-grow-1">${e.detay}</p>
                                    <hr class="my-2 text-muted">
                                    <div class="d-flex justify-content-between align-items-center text-muted small"><span>Yer: <b>${e.yer}</b></span><span>Tarih: <b>${tarih}</b></span></div>
                                </div>
                            </div>
                        `);
                    });
                }
            } catch (error) { console.error(error); }
        }

        // 2. KULÜPLERİ VERİTABANINDAN CANLI ÇEK VE SAĞ PANALE BAS
        async function kulupleriYukle() {
            const kulupAlani = document.getElementById("kuluplerAlani");
            try {
                const response = await fetch(`${API_URL}/club/all`);
                if (response.ok) {
                    const kulupler = await response.json();
                    kulupAlani.innerHTML = "";

                    if (kulupler.length === 0) {
                        kulupAlani.innerHTML = "<p class='text-muted small text-center py-3'>Kayıtlı kulüp bulunmamaktadır.</p>";
                        return;
                    }

                    kulupler.forEach(k => {
                        kulupAlani.insertAdjacentHTML("beforeend", `
                            <div class="list-group-item d-flex justify-content-between align-items-center py-3 px-0 border-bottom">
                                <div style="max-width: 70%;">
                                    <a href="club-profile.html?id=${k.kulupId}" class="fw-bold text-decoration-none text-primary-blue d-block">${k.kulupAdi}</a>
                                    <small class="text-muted text-truncate d-block">${k.aciklama}</small>
                                </div>
                                <button onclick="kulubeKatil(${k.kulupId})" class="btn btn-sm btn-primary rounded-pill px-3">Katıl</button>
                            </div>
                        `);
                    });
                }
            } catch (error) { console.error("Kulüpler çekilemedi:", error); }
        }

        // 3. YENİ KULÜP OLUŞTURMA
        document.getElementById("clubForm").addEventListener("submit", async (e) => {
            e.preventDefault();
            const data = {
                kulupAdi: document.getElementById("clubName").value,
                aciklama: document.getElementById("clubDesc").value,
                olusturanId: parseInt(aktifKullaniciId)
            };
            try {
                const response = await fetch(`${API_URL}/club/create`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(data)
                });
                if (response.ok) {
                    alert("Kulüp kurulum talebi onaylandı. Kurucu başkan olarak atandınız.");
                    location.reload();
                } else {
                    const err = await response.json(); alert(err.error);
                }
            } catch (e) { alert("Sunucu bağlantı hatası."); }
        });

        // 4. KULÜBE KATILMA
        async function kulubeKatil(kulupId) {
            try {
                const response = await fetch(`${API_URL}/club/join`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ kulupId: parseInt(kulupId), kullaniciId: parseInt(aktifKullaniciId) })
                });
                if (response.ok) alert("Kulüp üyeliğiniz başarıyla gerçekleştirildi.");
                else { const err = await response.json(); alert(err.error); }
            } catch (error) { alert("İşlem sırasında bir hata oluştu."); }
        }

        function cikisYap() { localStorage.clear(); window.location.href = "index.html"; }

        etkinlikleriYukle();
        kulupleriYukle();
    </script>
</body>

</html>
