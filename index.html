<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sosyal Medya - Giriş Yap</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #9fc1e3 !important;
        }

        .card {
            border: 8px solid #e2eaf1 !important;
            border-radius: 20px !important;
            box-shadow: 0 15px 35px rgba(30, 60, 114, 0.2) !important;
            padding: 10px;
        }

        .card-title {
            color: #1e3c72;
            font-weight: 800;
        }

        .form-control {
            border: 2px solid #e2eaf1 !important;
            border-radius: 10px !important;
            padding: 10px 15px;
        }

        .form-control:focus {
            border-color: #2a5298 !important;
            box-shadow: 0 0 0 0.2rem rgba(42, 82, 152, 0.25) !important;
        }

        .btn-primary {
            background-color: #2a5298 !important;
            border-color: #2a5298 !important;
            border-radius: 50px !important;
            padding: 10px 25px;
            font-weight: 600;
        }

        .btn-primary:hover {
            background-color: #1e3c72 !important;
        }

        .text-muted-blue {
            color: #627d98 !important;
        }
    </style>
</head>

<body>

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-4">
                <div class="card bg-white border-0">
                    <div class="card-body p-4">
                        <h3 class="card-title text-center mb-4">Giriş Yap</h3>

                        <form id="loginForm">
                            <div class="mb-3">
                                <label class="form-label small text-muted-blue fw-semibold">E-posta</label>
                                <input type="email" id="email" class="form-control" required
                                    pattern="[a-z0-9._%+-]+@[a-z0-9.-]*bartin\.edu\.tr"
                                    placeholder="okulnumaranız@ogrenci.bartin.edu.tr">
                            </div>
                            <div class="mb-4">
                                <label class="form-label small text-muted-blue fw-semibold">Şifre</label>
                                <input type="password" id="sifre" class="form-control" required placeholder="******">
                            </div>
                            <button type="submit" class="btn btn-primary w-100 mb-3">Giriş Yap</button>
                        </form>

                        <div id="alertMessage" class="alert alert-danger d-none small text-center"></div>

                        <div class="text-center mt-3">
                            <a href="register.html" class="text-decoration-none text-primary fw-bold">Henüz hesabın yok mu? Kayıt Ol</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_URL = "https://localhost:7160/api";

        document.getElementById("loginForm").addEventListener("submit", async (e) => {
            e.preventDefault();

            const email = document.getElementById("email").value;
            const sifre = document.getElementById("sifre").value;
            const alertBox = document.getElementById("alertMessage");

            alertBox.classList.add("d-none");

            try {
                const response = await fetch(`${API_URL}/auth/login`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ email: email, sifre: sifre })
                });

                const result = await response.json();

                if (response.ok) {
                    localStorage.setItem("kullaniciId", result.id);
                    localStorage.setItem("kullaniciAdi", result.kullaniciAdi);
                    localStorage.setItem("email", result.email);
                    window.location.href = "feed.html";
                } else {
                    alertBox.textContent = result.message || "Giriş bilgileri hatalı.";
                    alertBox.classList.remove("d-none");
                }
            } catch (error) {
                alertBox.textContent = "API sunucusuna bağlanılamadı.";
                alertBox.classList.remove("d-none");
            }
        });
    </script>
</body>
</html>
